# إعدادات نشر الموقع العام على Netlify.
# لوحة التحكم (admin/) لا تعمل على Netlify — فهي تُحذف من نسخة النشر هنا
# حتى لا يظهر كودها أو تُقرأ ملفاته من رابط Netlify العام.
# لوحة التحكم تبقى تعمل فقط من Replit، وأي حفظ فيها يُدفع لهذا المستودع
# على GitHub، فيلتقطه Netlify تلقائياً وينشر النسخة الجديدة.

[build]
  command = "rm -rf admin admin_templates server.py main.py pyproject.toml uv.lock .replit replit.nix .agents .local scripts exports .git .gitignore"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
